<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Spesial</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

h1 {
  font-size: 40px;
  animation: fadeIn 2s ease-in-out;
}

p {
  font-size: 18px;
  animation: fadeIn 3s ease-in-out;
}

.button {
  margin-top: 20px;
  padding: 12px 25px;
  background: #ff4da6;
  border: none;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  background: #ff1a8c;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* efek bintang */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity: 0;}
  50% {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <h1>✨ Undangan Spesial ✨</h1>
  <p>Kamu diundang ke acara istimewa kami</p>
  <p><b>Hari:</b> Minggu</p>
  <p><b>Tanggal:</b> 1 Januari 2027</p>
  <p><b>Tempat:</b> Rumah Kami</p>

  <button class="button" onclick="playMusic()">Buka Undangan 🎵</button>
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
  document.getElementById("music").play();
  alert("Selamat datang di undangan kami 🎉");
}

/* buat bintang random */
for (let i = 0; i < 50; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 100 + "%";
  star.style.left = Math.random() * 100 + "%";
  document.body.appendChild(star);
}
</script>

</body>
</html>
